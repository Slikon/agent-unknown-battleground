<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Unknown's Battlegrounds</title>
    <!-- Inline favicon so the browser's automatic /favicon.ico request doesn't 404. -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%E2%9A%94%EF%B8%8F</text></svg>"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #12181d;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Keep pixel art crisp when Phaser's canvas is scaled up. */
      #game canvas {
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
